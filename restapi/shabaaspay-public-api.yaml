        - direct_debit_accepted
        - direct_debit_rejected
      properties:
        auth_key:
          type: string
        payment_agreement:
          type: string
          format: uri
        payment_initiation:
          type: string
          format: uri
        direct_debit_accepted:
          type: string
          format: uri
        direct_debit_rejected:
          type: string
          format: uri

    WebhookConfig:
      type: object
      properties:
        payment_agreement:
          type: string
          format: uri
        payment_initiation:
          type: string
          format: uri
        direct_debit_accepted:
          type: string
          format: uri
        direct_debit_rejected:
          type: string
          format: uri

